name: Rust

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    name: Test
    runs-on: windows-latest
    env:
      CARGO_TARGET_DIR: target_verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run golden replay tests
        run: cargo test --test session_replay_golden

      - name: Run full test suite
        run: cargo test
